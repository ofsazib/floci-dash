# ─── Floci Dashboard — Docker Compose ───
#
# Usage:
#   make up          → start everything (foreground)
#   make up-bg       → start in background
#   make logs        → tail logs
#   make down        → stop
#   make rebuild     → force rebuild dashboard
#
# The Dashboard is built from the local Dockerfile.
# Floci uses the official ghcr.io image — no local source needed.

services:
  floci:
    image: floci/floci:latest
    container_name: floci
    ports:
      - "${FLOCI_PORT:-9878}:4566"
    environment:
      - FLOCI_SERVICES=s3,dynamodb,sqs,sns,lambda,iam,ec2,ecs,eks,ecr,rds,elasticache,neptune,kms,secretsmanager,cloudformation,eventbridge,ssm,kinesis,cloudwatch,cognito,acm,route53,cloudfront,apigateway,apigatewayv2,athena,glue,firehose,stepfunctions,msk,opensearch,ses,cloudmap,scheduler,pipes,backup,transfer,cloudtrail,appconfig,bedrock-runtime,textract,transcribe,pricing,ce,cur,bcm-data-exports,resource-groups-tagging,autoscaling,codebuild,codedeploy,appsync,config,sts
    volumes:
      - floci-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/_floci/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: floci-dashboard
    ports:
      - "${DASHBOARD_PORT:-9877}:3000"
    environment:
      - FLOCI_URL=http://floci:4566
      - AWS_REGION=us-east-1
      - NODE_ENV=production
    depends_on:
      floci:
        condition: service_healthy

volumes:
  floci-data:
