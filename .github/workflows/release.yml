# ─── Floci Dashboard — Release ───
#
# Triggered by git tag pushes (v* semver).
# Builds and publishes Docker images to GHCR with semver tags.
#
# Tag examples:
#   v1.2.3       → 1.2.3, 1.2, 1, latest
#   v1.2.3-rc.1  → 1.2.3-rc.1

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      floci:
        image: floci/floci:latest
        ports:
          - 9878:4566
        env:
          FLOCI_SERVICES: s3,dynamodb,sqs,sns,lambda,iam,ec2,rds,secretsmanager,eventbridge,cloudwatch,logs
        options: >-
          --health-cmd "curl -sf http://localhost:4566/_floci/health"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: make typecheck

      - name: Unit tests
        run: make test

      - name: Full test suite (unit + integration)
        run: make test-all
        env:
          FLOCI_URL: http://localhost:9878

  docker:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract semver tags — dashboard-only
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/ofsazib/floci-dash
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push — dashboard-only
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract semver tags — combined image
        id: meta-combined
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/ofsazib/floci-dash
          tags: |
            type=semver,pattern={{version}}-combined
            type=semver,pattern={{major}}.{{minor}}-combined
            type=semver,pattern={{major}}-combined
            type=raw,value=latest-combined

      - name: Build and push — combined (Floci + Dashboard)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.combined
          push: true
          tags: ${{ steps.meta-combined.outputs.tags }}
          labels: ${{ steps.meta-combined.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
