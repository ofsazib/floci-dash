# ─── Floci Dashboard — CI ───
#
# Runs on every push/PR to main.
#   - TypeScript typecheck
#   - Unit tests (fast, no dependencies)
#   - Integration tests (Floci runs as a service container)
#   - Coverage report uploaded as artifact

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      floci:
        image: floci/floci:latest
        ports:
          - 9878:4566
        env:
          FLOCI_SERVICES: s3,dynamodb,sqs,sns,lambda,iam,ec2,rds,secretsmanager,eventbridge,cloudwatch,logs
        options: >-
          --health-cmd "curl -sf http://localhost:4566/_floci/health"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: make typecheck

      - name: Unit tests (fast fail — no Floci needed)
        run: make test

      - name: Full test suite (unit + integration with Floci)
        run: make test-all
        env:
          FLOCI_URL: http://localhost:9878

      - name: Generate coverage report
        run: make test-cov

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          retention-days: 7

      - name: Upload to Codecov
        uses: codecov/codecov-action@v7
        with:
          directory: coverage/
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  docker:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate version tag
        id: version
        run: echo "tag=0.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Extract metadata — dashboard-only image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/ofsazib/floci-dash
          tags: |
            type=raw,value=${{ steps.version.outputs.tag }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push — dashboard-only
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata — combined image
        id: meta-combined
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/ofsazib/floci-dash
          tags: |
            type=raw,value=${{ steps.version.outputs.tag }}-combined
            type=raw,value=latest-combined,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push — combined (Floci + Dashboard)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.combined
          push: true
          tags: ${{ steps.meta-combined.outputs.tags }}
          labels: ${{ steps.meta-combined.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
